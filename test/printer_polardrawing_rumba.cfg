# =============================================================================
# polardrawing -- printer.cfg for Polar Drawing Machine with RUMBA board
# Project: https://github.com/YOUR_USERNAME/polardrawing
#
# Hardware:
#   - RUMBA board (ATmega2560)
#   - Raspberry Pi as host
#   - 2x NEMA17, 200 steps/rev, GT2 belt, 20-tooth drive pulleys
#   - 2x counterweight with idler pulley + MAX endstop
#   - 1x servo for pen up/down
#
# Future hardware (placeholders in config):
#   - 1x angle sensor (potentiometer/encoder) for pen carousel position
#   - 1x 360-degree continuous rotation servo for pen carousel
#
# FILE PLACEMENT on Raspberry Pi:
#   ~/printer_data/config/printer.cfg
# =============================================================================

# -----------------------------------------------------------------------------
# MCU -- RUMBA board via USB
# -----------------------------------------------------------------------------
[mcu]
# Find your port with: ls /dev/serial/by-id/
serial: /dev/serial/by-id/usb-Arduino__www.arduino.cc__0042_XXXX-if00
baud: 250000

# -----------------------------------------------------------------------------
# Printer / Kinematics
# -----------------------------------------------------------------------------
[printer]
kinematics: polardrawing
max_velocity: 200
max_accel: 3000
max_z_velocity: 5     # Z axis unused -- required by Klipper
max_z_accel: 100

# -----------------------------------------------------------------------------
# Polar Drawing kinematics parameters
# Read by polardrawing.py from this [polardrawing] section.
# -----------------------------------------------------------------------------
[polardrawing]

# Distance between motor shaft centres (mm).
# Measure: centre of left drive pulley to centre of right drive pulley.
motor_distance: 650.0

# Belt length when both counterweights trigger endstops (mm).
# Measured: motor pulley centre to pen tip with gondola at homed position.
hypotenuse_length_at_home: 1035.0

# Maximum belt length (gondola at drawing bottom-right corner).
max_belt_length: 1000.0

# Physical minimum belt length (safety limit).
min_belt_length: 100.0

# ── Drawing coordinate origin ─────────────────────────────────────────────────
#
# Drawing (0, 0) = top-left corner of the drawing area.
# Defined relative to the machine frame:
#   draw_margin_left: mm from left motor shaft to left edge of drawing area
#   draw_margin_top:  mm from motor axis (horizontal line through both motors)
#                     down to the top edge of the drawing area
#
# Your machine: both margins = 115 mm.
draw_margin_left: 115.0
draw_margin_top:  115.0

# ── Drawing area size -- DIN A2 landscape ─────────────────────────────────────
# DIN A2 landscape = 594 x 420 mm
# Drawing X goes from 0 to draw_width   (left to right)
# Drawing Y goes from 0 to draw_height  (top to bottom)
draw_width:  594.0
draw_height: 420.0

# ── Homing ────────────────────────────────────────────────────────────────────
# Speed during homing (mm/s). Start at 30 until you trust the machine.
homing_speed: 50

# Retract after endstop triggers (mm).
homing_retract_dist: 10

# ── Pen changer (PLACEHOLDER -- hardware not yet fitted) ─────────────────────
# Uncomment when hardware is ready.
# pen_changer_angle_sensor_pin: PA1   # ADC pin -- carousel angle feedback
# pen_changer_servo_pin:        PH4   # 360-deg continuous rotation servo pin
# pen_count:                    4     # number of pen slots on carousel

# -----------------------------------------------------------------------------
# Left stepper motor -- controls left belt
# RUMBA X-axis pins
# -----------------------------------------------------------------------------
[stepper_left]
step_pin:   PC0       # RUMBA X_STEP
dir_pin:   !PL1       # RUMBA X_DIR  (! = inverted: positive = belt longer = gondola down)
enable_pin: !PA7      # RUMBA X_ENABLE

# GT2 belt, 20-tooth pulley: rotation_distance = 20 teeth x 2 mm = 40 mm
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

# MAX endstop: counterweight at top = belt at minimum = gondola homed.
# RUMBA X_MAX = ATmega PE3 (Arduino pin 35)
endstop_pin: ^PE3

# Position when endstop triggers = belt length at that moment.
# position_min = same as endstop = cannot drive belt shorter than homed length.
position_endstop: 1035.0
position_min:     1035.0
position_max:     1400.0    # match max_belt_length above

# Homing drives toward shorter belt (gondola rises, counterweight goes up).
homing_positive_dir: false

# -----------------------------------------------------------------------------
# Right stepper motor -- controls right belt
# RUMBA Y-axis pins
# -----------------------------------------------------------------------------
[stepper_right]
step_pin:   PC6       # RUMBA Y_STEP
dir_pin:    PL0       # RUMBA Y_DIR  (add ! prefix if motor turns wrong way)
enable_pin: !PA7      # RUMBA Y_ENABLE (shared with X on RUMBA)

rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200

# RUMBA Y_MAX = ATmega PJ1 (Arduino pin 34)
endstop_pin: ^PJ1

position_endstop: 1035.0
position_min:     1035.0
position_max:     1400.0
homing_positive_dir: false

# -----------------------------------------------------------------------------
# Pen lift servo
#
# Makelangelo software defaults: pen up = 90 deg, pen down = 40 deg
# RUMBA Fan0 connector = PH3 (PWM capable)
# Adjust pin and angles to match your servo.
# -----------------------------------------------------------------------------
[servo pen_lift]
pin: PH3
maximum_servo_angle: 180
minimum_pulse_width: 0.001
maximum_pulse_width: 0.002
initial_angle: 90             # pen up on startup

# -----------------------------------------------------------------------------
# Pen changer servo (PLACEHOLDER -- 360-degree continuous rotation servo)
# Uncomment when hardware is fitted.
# Use a separate pin from pen_lift.
# -----------------------------------------------------------------------------
# [servo pen_changer]
# pin: PH4
# maximum_servo_angle: 360
# minimum_pulse_width: 0.001
# maximum_pulse_width: 0.002
# initial_angle: 0

# -----------------------------------------------------------------------------
# Pen carousel angle sensor (PLACEHOLDER -- potentiometer or encoder)
# Reads physical carousel rotation so Klipper knows the active pen slot.
# Uncomment when hardware is fitted.
# -----------------------------------------------------------------------------
# [adc_temperature pen_carousel_angle]
# sensor_pin: PA1    # analog input -- wire to wiper of rotary potentiometer

# -----------------------------------------------------------------------------
# MCU temperature -- keeps Klipper happy without an extruder
# -----------------------------------------------------------------------------
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# -----------------------------------------------------------------------------
# Mainsail / Moonraker required sections
# -----------------------------------------------------------------------------
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

# Arc support (G2/G3) -- Makelangelo software uses arcs for curves
[gcode_arcs]
resolution: 0.5

# =============================================================================
# G-CODE MACROS
# Full Makelangelo software compatibility.
# =============================================================================

# ── Pen lift ──────────────────────────────────────────────────────────────────

[gcode_macro PEN_UP]
description: Raise the pen
gcode:
    SET_SERVO SERVO=pen_lift ANGLE=90

[gcode_macro PEN_DOWN]
description: Lower the pen onto the paper
gcode:
    SET_SERVO SERVO=pen_lift ANGLE=40

# M280 compatibility -- Makelangelo sends M280 P0 S{angle}
[gcode_macro M280]
description: Servo control (Makelangelo compatibility: M280 P0 S90)
gcode:
    {% set angle = params.S | default(90) | float %}
    SET_SERVO SERVO=pen_lift ANGLE={angle}

# ── Homing ────────────────────────────────────────────────────────────────────

[gcode_macro G28]
description: Home both belt motors, set drawing position
rename_existing: G28.1
gcode:
    PEN_UP
    G28.1
    # After homing, Klipper knows the gondola drawing position.
    # Move to drawing origin (0, 0) = top-left corner of paper.
    G0 X0 Y0 F3000

# ── Movement helpers ──────────────────────────────────────────────────────────

[gcode_macro GO_HOME]
description: Move gondola to drawing origin (0, 0) without running endstops
gcode:
    PEN_UP
    G0 X0 Y0 F3000

[gcode_macro GO_CENTRE]
description: Move gondola to centre of drawing area
gcode:
    {% set pd = printer['polardrawing'] %}
    PEN_UP
    G0 X{pd.draw_width / 2} Y{pd.draw_height / 2} F3000

# ── Pen changer (PLACEHOLDER) ─────────────────────────────────────────────────
#
# CHANGE_PEN P{n} selects pen slot n (0-indexed).
# Makelangelo software can be configured to emit CHANGE_PEN P{n} at
# colour-change points.  The macro works now (no-op) and will activate
# automatically once the hardware and polardrawing.py implementation are ready.

[gcode_macro CHANGE_PEN]
description: Select pen slot n. Usage: CHANGE_PEN P=0  (PLACEHOLDER)
gcode:
    {% set pen = params.P | default(0) | int %}
    PEN_UP
    G4 P200
    M118 CHANGE_PEN: slot {pen} requested -- carousel not yet fitted
    # TODO: replace M118 with carousel rotation logic when hardware is ready.
    # The polardrawing.py _do_pen_change() method is the implementation point.
    G4 P200

[gcode_macro USE_PEN_0]
description: Select pen 0 (placeholder)
gcode: CHANGE_PEN P=0

[gcode_macro USE_PEN_1]
description: Select pen 1 (placeholder)
gcode: CHANGE_PEN P=1

[gcode_macro USE_PEN_2]
description: Select pen 2 (placeholder)
gcode: CHANGE_PEN P=2

[gcode_macro USE_PEN_3]
description: Select pen 3 (placeholder)
gcode: CHANGE_PEN P=3

# ── Calibration ───────────────────────────────────────────────────────────────

[gcode_macro CALIBRATE_PEN]
description: Test pen servo angles. Usage: CALIBRATE_PEN UP=90 DOWN=40
gcode:
    {% set up_angle   = params.UP   | default(90) | float %}
    {% set down_angle = params.DOWN | default(40) | float %}
    M118 Testing pen-up: {up_angle} degrees
    SET_SERVO SERVO=pen_lift ANGLE={up_angle}
    G4 P2000
    M118 Testing pen-down: {down_angle} degrees
    SET_SERVO SERVO=pen_lift ANGLE={down_angle}
    G4 P2000
    SET_SERVO SERVO=pen_lift ANGLE={up_angle}
    M118 Done -- update PEN_UP / PEN_DOWN macros with confirmed angles

# ── Motor control ─────────────────────────────────────────────────────────────

[gcode_macro M18]
description: Disable stepper motors
rename_existing: M18.1
gcode:
    M18.1
    M118 Motors disabled

# ── Machine info ──────────────────────────────────────────────────────────────

[gcode_macro POLARDRAWING_INFO]
description: Print machine geometry and state to console
gcode:
    {% set pd = printer['polardrawing'] %}
    M118 === Polar Drawing Machine ===
    M118 Motor distance:          {pd.motor_distance} mm
    M118 Belt at home:            {pd.hypotenuse_home} mm
    M118 Gondola below motors:    {pd.home_y_world} mm (at homing)
    M118 Drawing origin (world):  X={pd.draw_origin_wx}  Y={pd.draw_origin_wy} mm
    M118 Drawing area:            {pd.draw_width} x {pd.draw_height} mm
    M118 Homed drawing position:  X={pd.homed_drawing_x}  Y={pd.homed_drawing_y} mm
    M118 Current pen:             {pd.current_pen} of {pd.pen_count}
    M118 Pen changer:             {'enabled' if pd.pen_changer_enabled else 'placeholder'}

# ── Print start / end ─────────────────────────────────────────────────────────

[gcode_macro START_PRINT]
description: Called at start of every plot
gcode:
    G28

[gcode_macro END_PRINT]
description: Called at end of every plot
gcode:
    PEN_UP
    GO_HOME
    M18

# -----------------------------------------------------------------------------
# Mainsail UI -- created automatically by KIAUH at ~/printer_data/config/
# -----------------------------------------------------------------------------
[include mainsail.cfg]
